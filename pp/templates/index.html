<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Appointment Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-white via-blue-50 to-blue-100">

<header class="bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow">
  <div class="max-w-6xl mx-auto px-6 py-6">
    <h1 class="text-2xl md:text-3xl font-semibold">Hospital Management System Portal</h1>
    <p class="mt-1 text-sm md:text-base opacity-90">A centralized platform for managing Doctor appointments efficiently.</p>
  </div>
  <div class="h-2 bg-white/10"></div>
</header>

<div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

  <!-- LEFT PANEL -->
  <div class="md:col-span-2 bg-white rounded-xl shadow p-5">
    <h2 class="text-xl font-semibold mb-4 text-blue-800">Appointments List</h2>

    <table class="w-full text-sm">
      <thead class="border-b">
        <tr class="text-left text-blue-700">
          <th>ID</th>
          <th>Patient</th>
          <th>Doctor</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="appointmentTable" class="divide-y">
        <tr>
          <td colspan="4" class="py-3 text-gray-500">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- RIGHT PANEL -->
  <div class="bg-white rounded-xl shadow p-5">
    <h2 class="text-xl font-semibold mb-1 text-blue-800">Appointment Details</h2>
    <p class="text-xs text-gray-500 mb-4">Select an appointment to view or edit</p>

    <form id="detailsForm" class="space-y-4 text-sm">
      <div>
        <label class="block text-gray-600">Patient Name</label>
        <input id="patientInput" type="text" class="mt-1 w-full border rounded px-3 py-2" placeholder="Patient Name" />
      </div>
      <div>
        <label class="block text-gray-600">Doctor Name</label>
        <input id="doctorInput" type="text" class="mt-1 w-full border rounded px-3 py-2" placeholder="Doctor Name" />
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-600">Date</label>
          <input id="dateInput" type="date" class="mt-1 w-full border rounded px-3 py-2" placeholder="dd/mm/yyyy" />
        </div>
        <div>
          <label class="block text-gray-600">Time</label>
          <input id="timeInput" type="text" class="mt-1 w-full border rounded px-3 py-2" placeholder="e.g., 10:30 AM" />
        </div>
      </div>
      <div>
        <label class="block text-gray-600">Status</label>
        <select id="statusInput" class="mt-1 w-full border rounded px-3 py-2">
          <option>Pending</option>
          <option>Approved</option>
          <option>Cancelled</option>
        </select>
      </div>
      <div class="flex items-center justify-between">
        <div id="saveMsg" class="text-xs text-gray-500"></div>
        <button id="saveBtn" type="button" class="bg-blue-600 text-white px-4 py-2 rounded disabled:opacity-50">Save / Update</button>
      </div>
    </form>
  </div>

</div>

<script>
let currentId = null;
function loadAppointments() {
  fetch("/api/appointments")
    .then(res => res.json())
    .then(data => {
      if (!Array.isArray(data) || data.length === 0) {
        document.getElementById("appointmentTable").innerHTML = `
          <tr>
            <td colspan="4" class="py-3 text-gray-500">No appointments found</td>
          </tr>
        `;
        return;
      }
      let html = "";
      data.forEach(a => {
        html += `
          <tr class="cursor-pointer hover:bg-blue-50"
              onclick="loadAppointment('${a.id}')">
            <td>${a.id}</td>
            <td>${a.patient}</td>
            <td>${a.doctor}</td>
            <td>${a.status}</td>
          </tr>
        `;
      });
      document.getElementById("appointmentTable").innerHTML = html;
    })
    .catch(() => {
      document.getElementById("appointmentTable").innerHTML = `
        <tr>
          <td colspan="4" class="py-3 text-red-600">Failed to load data</td>
        </tr>
      `;
    });
}

function loadAppointment(id) {
  fetch(`/api/appointments/${id}`)
    .then(res => res.json())
    .then(a => {
      currentId = a.id;
      document.getElementById("patientInput").value = a.patient || "";
      document.getElementById("doctorInput").value = a.doctor || "";
      document.getElementById("dateInput").value = a.date || "";
      document.getElementById("timeInput").value = a.time || "";
      document.getElementById("statusInput").value = a.status || "Pending";
      document.getElementById("saveBtn").disabled = false;
      document.getElementById("saveMsg").textContent = "";
    });
}

function saveAppointment() {
  if (!currentId) return;
  const payload = {
    patient: document.getElementById("patientInput").value.trim(),
    doctor: document.getElementById("doctorInput").value.trim(),
    date: document.getElementById("dateInput").value,
    time: document.getElementById("timeInput").value.trim(),
    status: document.getElementById("statusInput").value
  };
  fetch(`/api/appointments/${currentId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
    .then(res => res.ok ? res.json() : Promise.reject())
    .then(() => {
      document.getElementById("saveMsg").textContent = "Saved";
      loadAppointments();
    })
    .catch(() => {
      document.getElementById("saveMsg").textContent = "Failed";
    });
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("saveBtn").disabled = true;
  document.getElementById("saveBtn").addEventListener("click", saveAppointment);
});

loadAppointments();
</script>

</body>
</html>
